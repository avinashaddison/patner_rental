version: "3.9"

# Local + production-ready compose. For local dev you typically only need `postgres`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: companion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: companion
      POSTGRES_DB: companion_ranchi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companion -d companion_ranchi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: companion_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: companion_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://companion:companion@postgres:5432/companion_ranchi?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: companion_admin
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
