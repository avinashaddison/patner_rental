# ============================================================================
# Companion Ranchi — nginx reverse proxy (production)
#
# Fronts two upstreams with TLS:
#   api.companionranchi.com   -> backend  (Node/Express + Socket.IO) :4000
#   admin.companionranchi.com -> admin     (Next.js)                  :3000
#
# Key requirements handled here:
#   - Socket.IO WebSocket upgrade (chat/presence) on the api host
#   - RAW body preserved for the Razorpay webhook (signature verification)
#   - HTTP -> HTTPS redirect, modern TLS, security headers
#
# TLS NOTES
#   Obtain certs with certbot (writes the ssl_certificate lines for you):
#     sudo certbot --nginx -d api.companionranchi.com -d admin.companionranchi.com
#   Or point ssl_certificate / ssl_certificate_key at your own PEMs below.
#   Generate the DH params once:  openssl dhparam -out /etc/nginx/dhparam.pem 2048
# ============================================================================

# ---- Upstreams (adjust host/port if backend/admin run elsewhere) ----
upstream companion_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream companion_admin {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Map the Upgrade header so non-websocket requests don't send "Connection: upgrade".
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Reasonable real-IP handling if you sit behind Cloudflare/another LB.
# set_real_ip_from <LB_CIDR>;  real_ip_header X-Forwarded-For;

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect for both hosts (keep ACME challenge reachable)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.companionranchi.com admin.companionranchi.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ===========================================================================
# API host — backend (REST under /api + Socket.IO)
# ===========================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.companionranchi.com;

    # ---- TLS (certbot fills these; or set your own PEM paths) ----
    ssl_certificate     /etc/letsencrypt/live/api.companionranchi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.companionranchi.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    # ssl_dhparam       /etc/nginx/dhparam.pem;
    # ssl_stapling on; ssl_stapling_verify on;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Media is large enough to matter; chat images / profile photos still go to R2 directly,
    # but allow generous client bodies for any multipart fallbacks.
    client_max_body_size 15m;
    client_body_timeout  60s;

    # Common proxy headers (applied per-location below)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # --------------------------------------------------------------------
    # Razorpay webhook — MUST receive the RAW, unbuffered body so the
    # backend can verify X-Razorpay-Signature against exact bytes.
    # A plain proxy_pass does not modify the body; we also disable request
    # buffering and forward the signature header explicitly.
    # --------------------------------------------------------------------
    location = /api/payments/webhook {
        proxy_pass http://companion_backend;
        proxy_request_buffering off;          # stream the body through untouched
        proxy_set_header X-Razorpay-Signature $http_x_razorpay_signature;
        proxy_set_header Content-Type $content_type;
        proxy_read_timeout 30s;
    }

    # --------------------------------------------------------------------
    # Socket.IO (chat / presence). The Flutter app connects to the default
    # namespace; engine.io polls/upgrades under /socket.io/. Enable the
    # WebSocket upgrade and long read timeouts here.
    # --------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://companion_backend;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout  3600s;            # keep idle websockets alive
        proxy_send_timeout  3600s;
    }

    # --------------------------------------------------------------------
    # REST API + health
    # --------------------------------------------------------------------
    location / {
        proxy_pass http://companion_backend;
        # Allow upgrades here too in case the client connects Socket.IO at root.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 75s;
    }
}

# ===========================================================================
# Admin host — Next.js admin panel
# ===========================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.companionranchi.com;

    ssl_certificate     /etc/letsencrypt/live/admin.companionranchi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.companionranchi.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 15m;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Next.js static assets — long cache.
    location /_next/static/ {
        proxy_pass http://companion_admin;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://companion_admin;
        # Next.js dev/HMR uses websockets; harmless in prod, needed if you proxy dev.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 75s;
    }
}
