# R8 (release minify) OOMs below ~2G on this project; 1G is enough only for
# debug builds. On this 8GB machine close heavy apps before a release build.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Single worker keeps peak memory down for the heavier native builds.
org.gradle.workers.max=1
org.gradle.vfs.watch=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# AGP 9 requires every dependency to declare a unique namespace, but Agora's
# own artifacts (iris-rtc + agora-special-full) both ship `io.agora.rtc`.
# Relax the check until Agora fixes their manifests upstream.
android.uniquePackageNames=false
